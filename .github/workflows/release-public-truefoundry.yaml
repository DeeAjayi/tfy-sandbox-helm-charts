# Copies `truefoundry` + `tfy-llm-gateway` from this repo into
# truefoundry/infra-charts whenever a final chart release ships (triggered by
# the bare truefoundry-X.Y.Z tag — RCs never reach this, see the tag glob
# below). Mirrors helm-charts' own branching model instead of landing
# directly on infra-charts main:
#
#   1. Ensure release/truefoundry-<VERSION> exists in infra-charts (cut from
#      its main). Carries the same truefoundry-X.Y.Z string as the tag that
#      triggered this run, under a release/ prefix — the prefix is load-
#      bearing: a branch named EXACTLY truefoundry-<VERSION> collides with
#      the identically-named git tag chart-releaser mints in that repo, and
#      git short-ref resolution (actions/checkout, create-pull-request)
#      breaks on the ambiguity for every run after the tag exists.
#   2. Copy the charts in via a PR into THAT branch, then auto-merge.
#   3. gh-pages publish happens off that push (infra-charts' release.yaml /
#      artifactory-helm-release.yaml both trigger on release/truefoundry-*
#      pushes).
#   4. Only if this version is the current latest shipped line, ALSO
#      fast-forward infra-charts main via a squash PR — same
#      "latest-line-only" rule helm-charts applies to its own main.
#   5. Separately, also snapshot tfy-llm-gateway (versioned independently of
#      truefoundry) into its OWN release/tfy-llm-gateway-<its version>
#      branch — pure reference so its incremental history is browsable even
#      when its version diverges from the bundled branch above. Not part of
#      the release/publish flow: never merges anywhere, and its name doesn't
#      match any trigger in infra-charts' workflows.
#
# Nothing is ever released to gh-pages from a raw push to infra-charts main
# for these two charts anymore — release.yaml explicitly excludes them on
# that trigger (see infra-charts/.github/workflows/release.yaml).
name: TrueFoundry Chart Public Release

on:
  push:
    tags:
      - "truefoundry-[0-9]+.[0-9]+.[0-9]+"

env:
  # Override via repo variable INFRA_CHARTS_REPO for sandbox/fork testing.
  INFRA_REPO: ${{ vars.INFRA_CHARTS_REPO || 'truefoundry/infra-charts' }}

jobs:
  release_truefoundry:
    name: Release Truefoundry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=$(echo "$TAG_NAME" | sed 's/truefoundry-//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # release/ prefix keeps the branch out of chart-releaser's tag
          # namespace: a branch named exactly truefoundry-<VERSION> collides
          # with the truefoundry-<VERSION> tag chart-releaser mints in the
          # same repo, and git short-ref resolution (actions/checkout,
          # peter-evans/create-pull-request) breaks on the ambiguity.
          echo "INFRA_BRANCH=release/truefoundry-${VERSION}" >> "$GITHUB_ENV"

      - name: Update chart version
        run: |
          CHART_FILE="./charts/truefoundry/Chart.yaml"
          yq e ".version = env(VERSION)" -i "$CHART_FILE"
        env:
          VERSION: ${{ env.VERSION }}

      # This tag's own commit is the source of truth for "is this the
      # current latest line" — compare it against every other final
      # truefoundry-X.Y.Z tag rather than trusting main (main may lag or,
      # per this same change, never be touched at all for an older line).
      - name: Determine whether this is the latest shipped line
        id: latest_line
        run: |
          LATEST=$(git tag -l 'truefoundry-*' \
            | grep -E '^truefoundry-[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's/truefoundry-//' \
            | sort -V | tail -1)
          if [ "$VERSION" = "$LATEST" ]; then
            echo "is_latest_line=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest_line=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Latest shipped truefoundry tag: ${LATEST:-<none>}; this release: $VERSION"

      - name: Ensure infra-charts release branch exists
        env:
          GH_TOKEN: ${{ secrets.TF_GITHUB_CI_ADMIN_TOKEN }}
        run: |
          # Exact-ref existence check. The branch name contains '/', which
          # must be %-encoded so the refs API sees a single ref segment
          # (heads/release%2Ftruefoundry-X.Y.Z) — same convention as
          # scripts/release/ensure_service_branches.py. Belt-and-braces, the
          # RESOLVED ref name is also compared rather than trusting the exit
          # code alone — a transient API error would otherwise be misread as
          # "branch missing"/"branch exists".
          ENCODED_BRANCH="${INFRA_BRANCH//\//%2F}"
          FOUND_REF=$(gh api "repos/${INFRA_REPO}/git/ref/heads/${ENCODED_BRANCH}" --jq '.ref' 2>/dev/null || true)
          if [ "$FOUND_REF" = "refs/heads/${INFRA_BRANCH}" ]; then
            echo "${INFRA_BRANCH} already exists in ${INFRA_REPO}"
            exit 0
          fi
          MAIN_SHA=$(gh api "repos/${INFRA_REPO}/git/ref/heads/main" --jq .object.sha)
          gh api "repos/${INFRA_REPO}/git/refs" --method POST \
            -f "ref=refs/heads/${INFRA_BRANCH}" -f "sha=${MAIN_SHA}"
          echo "Created ${INFRA_BRANCH} in ${INFRA_REPO} from main"

      - name: Install python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      - name: Checkout charts
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.INFRA_CHARTS_REPO || 'truefoundry/infra-charts' }}
          ref: ${{ env.INFRA_BRANCH }}
          token: ${{ secrets.TF_GITHUB_CI_ADMIN_TOKEN }}
          path: tmp_ahc

      - name: Copy charts
        run: |
          rm -r ./tmp_ahc/charts/truefoundry
          rm -r ./tmp_ahc/charts/tfy-llm-gateway
          cp -r ./charts/truefoundry ./tmp_ahc/charts/
          cp -r ./charts/tfy-llm-gateway ./tmp_ahc/charts/

      # The umbrella's tfy-llm-gateway dependency resolves from an OCI
      # registry; prod's is anonymously pullable but a fork/sandbox registry
      # (e.g. private GHCR packages) may not be — log in when creds exist.
      - name: Helm registry login (for OCI chart dependencies)
        env:
          REGISTRY_HOST: ${{ vars.TRUEFOUNDRY_ARTIFACTORY_REGISTRY_URL }}
          REGISTRY_USER: ${{ secrets.TRUEFOUNDRY_ARTIFACTORY_PUBLIC_USERNAME }}
          REGISTRY_PASS: ${{ secrets.TRUEFOUNDRY_ARTIFACTORY_PUBLIC_PASSWORD }}
        run: |
          if [ -n "$REGISTRY_HOST" ] && [ -n "$REGISTRY_USER" ]; then
            helm registry login "$REGISTRY_HOST" -u "$REGISTRY_USER" -p "$REGISTRY_PASS"
          else
            echo "Registry host/creds unset; relying on anonymous pulls."
          fi

      - name: Update Helm dependencies for Truefoundry chart
        run: |
          helm dependency update ./tmp_ahc/charts/truefoundry
          rm -rf ./tmp_ahc/charts/truefoundry/charts/*.tgz
          helm dependency update ./tmp_ahc/charts/tfy-llm-gateway
          rm -rf ./tmp_ahc/charts/tfy-llm-gateway/charts/*.tgz

      - name: Create Pull Request into the release branch
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "[CI] Publish Truefoundry chart version ${{ env.VERSION }}"
          branch: truefoundry-version-${{ env.VERSION }}
          base: ${{ env.INFRA_BRANCH }}
          path: tmp_ahc
          title: "[CI] Publish truefoundry to version ${{ env.VERSION }}"
          body: |
            Copies `truefoundry` and `tfy-llm-gateway` at version `${{ env.VERSION }}` from `truefoundry/helm-charts` into `charts/`, on the release branch — gh-pages publish happens off this branch, not off main.

            ---
            Source: `truefoundry/helm-charts` workflow `.github/workflows/release-public-truefoundry.yaml`
            Triggered by tag: `${{ github.ref_name }}`
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          token: ${{ secrets.TF_GITHUB_CI_ADMIN_TOKEN }}

      - name: Merge into the release branch
        if: ${{ steps.create_pr.outputs.pull-request-operation == 'created' || steps.create_pr.outputs.pull-request-operation == 'updated' }}
        env:
          GH_TOKEN: ${{ secrets.TF_GITHUB_CI_ADMIN_TOKEN }}
          HEAD_BRANCH: truefoundry-version-${{ env.VERSION }}
        run: |
          # Explicit precondition: the plain-squash fallback below is an
          # IMMEDIATE merge attempt that infra-charts only rejects if a
          # required-status-check rule is actually scoped to this branch —
          # not reliably true here — so without this, a check still running
          # (or already failed) wouldn't stop the fallback from merging anyway.
          python3 scripts/release/wait_for_checks.py --repo "$INFRA_REPO" --head-branch "$HEAD_BRANCH"
          if gh pr merge "$HEAD_BRANCH" --repo "$INFRA_REPO" --auto --squash; then
            :
          elif gh pr merge "$HEAD_BRANCH" --repo "$INFRA_REPO" --squash; then
            :
          else
            echo "::warning::Falling back to admin merge for $HEAD_BRANCH (bypasses branch protection)."
            gh pr merge "$HEAD_BRANCH" --repo "$INFRA_REPO" --squash --admin
          fi
          python3 scripts/release/wait_for_merge.py --repo "$INFRA_REPO" --head-branch "$HEAD_BRANCH"

      # Only the current latest line ever advances infra-charts main — same
      # rule helm-charts applies to its OWN main. An older-line hotfix final
      # still published above (branch + gh-pages), it just never reaches main.
      - name: Promote release branch into infra-charts main
        if: ${{ steps.latest_line.outputs.is_latest_line == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.TF_GITHUB_CI_ADMIN_TOKEN }}
        run: |
          # %-encode the '/' in the branch name so the refs API resolves it
          # as a single ref segment (see the ensure-branch step above).
          ENCODED_BRANCH="${INFRA_BRANCH//\//%2F}"
          gh api "repos/${INFRA_REPO}/git/ref/heads/main" --jq .object.sha > /tmp/main_sha
          gh api "repos/${INFRA_REPO}/git/ref/heads/${ENCODED_BRANCH}" --jq .object.sha > /tmp/branch_sha
          if [ "$(cat /tmp/main_sha)" = "$(cat /tmp/branch_sha)" ]; then
            echo "main is already up to date with ${INFRA_BRANCH}; nothing to promote."
            exit 0
          fi

          {
            echo "Auto-generated by release-public-truefoundry.yaml — forwards ${INFRA_BRANCH} to main."
            echo
            echo "---"
            echo "Source: \`${GITHUB_REPOSITORY}\` workflow \`.github/workflows/release-public-truefoundry.yaml\`"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > /tmp/promote_body.md

          OPEN_COUNT=$(gh pr list --repo "$INFRA_REPO" --head "$INFRA_BRANCH" --base main --state open --json number --jq 'length')
          if [ "$OPEN_COUNT" -ge 1 ]; then
            gh pr edit "$INFRA_BRANCH" --repo "$INFRA_REPO" \
              --title "[release] promote ${VERSION} to main" --body-file /tmp/promote_body.md
          else
            gh pr create --repo "$INFRA_REPO" --base main --head "$INFRA_BRANCH" \
              --title "[release] promote ${VERSION} to main" --body-file /tmp/promote_body.md
          fi

          python3 scripts/release/wait_for_checks.py --repo "$INFRA_REPO" --head-branch "$INFRA_BRANCH"
          if gh pr merge "$INFRA_BRANCH" --repo "$INFRA_REPO" --auto --squash; then
            :
          elif gh pr merge "$INFRA_BRANCH" --repo "$INFRA_REPO" --squash; then
            :
          else
            echo "::warning::Falling back to admin merge for ${INFRA_BRANCH} -> main (bypasses branch protection)."
            gh pr merge "$INFRA_BRANCH" --repo "$INFRA_REPO" --squash --admin
          fi
          python3 scripts/release/wait_for_merge.py --repo "$INFRA_REPO" --head-branch "$INFRA_BRANCH"

      # Reference-only: tfy-llm-gateway is versioned independently of
      # truefoundry (see update_values.py), so the bundled truefoundry-<VERSION>
      # branch above doesn't reflect the gateway's OWN version when the two
      # lines diverge. This gives it a branch named after its own version
      # purely so its incremental history is browsable on its own — it is
      # NOT part of the release/publish flow: it never merges into main,
      # and its name (tfy-llm-gateway-*) doesn't match any trigger in
      # infra-charts' release.yaml / artifactory-helm-release.yaml, so it
      # can't accidentally cause a duplicate publish.
      - name: Determine tfy-llm-gateway's own version
        id: gateway_version
        run: |
          GATEWAY_VERSION=$(yq e '.version' ./charts/tfy-llm-gateway/Chart.yaml)
          echo "GATEWAY_VERSION=$GATEWAY_VERSION" >> "$GITHUB_ENV"
          # Same release/ prefix rationale as INFRA_BRANCH: avoid colliding
          # with chart-releaser's tfy-llm-gateway-<VERSION> tag.
          echo "GATEWAY_BRANCH=release/tfy-llm-gateway-${GATEWAY_VERSION}" >> "$GITHUB_ENV"

      - name: Ensure tfy-llm-gateway reference branch exists
        env:
          GH_TOKEN: ${{ secrets.TF_GITHUB_CI_ADMIN_TOKEN }}
        run: |
          # Exact-ref existence check with %-encoded '/' — same rationale as
          # the release-branch ensure step above. NOTE: an existing branch
          # does NOT skip the snapshot below — a previous run may have
          # created the branch and then died before pushing the snapshot
          # commit, so the snapshot always runs and relies on its own
          # "commit only if the tree actually changed" check for idempotency.
          ENCODED_BRANCH="${GATEWAY_BRANCH//\//%2F}"
          FOUND_REF=$(gh api "repos/${INFRA_REPO}/git/ref/heads/${ENCODED_BRANCH}" --jq '.ref' 2>/dev/null || true)
          if [ "$FOUND_REF" = "refs/heads/${GATEWAY_BRANCH}" ]; then
            echo "${GATEWAY_BRANCH} already exists in ${INFRA_REPO}"
          else
            MAIN_SHA=$(gh api "repos/${INFRA_REPO}/git/ref/heads/main" --jq .object.sha)
            gh api "repos/${INFRA_REPO}/git/refs" --method POST \
              -f "ref=refs/heads/${GATEWAY_BRANCH}" -f "sha=${MAIN_SHA}"
            echo "Created ${GATEWAY_BRANCH} in ${INFRA_REPO} from main"
          fi

      - name: Checkout tfy-llm-gateway reference branch
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.INFRA_CHARTS_REPO || 'truefoundry/infra-charts' }}
          ref: ${{ env.GATEWAY_BRANCH }}
          token: ${{ secrets.TF_GITHUB_CI_ADMIN_TOKEN }}
          path: tmp_gateway_ref

      - name: Snapshot tfy-llm-gateway into its reference branch
        working-directory: tmp_gateway_ref
        run: |
          rm -rf charts/tfy-llm-gateway
          cp -r ../charts/tfy-llm-gateway charts/
          git config user.name "truefoundry-ci"
          git config user.email "ci@truefoundry.com"
          git add charts/tfy-llm-gateway
          if git diff --cached --quiet; then
            echo "Branch already carries this exact tfy-llm-gateway tree; nothing to commit."
          else
            git commit -m "[CI] tfy-llm-gateway ${GATEWAY_VERSION} (reference snapshot, not released from this branch)"
            git push origin "HEAD:refs/heads/${GATEWAY_BRANCH}"
          fi
